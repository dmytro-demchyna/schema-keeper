name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which command were you running?
      options:
        - dump
        - verify
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `schemakeeper dump ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste the full error output here.
      render: text
    validations:
      required: false

  - type: input
    id: schema-keeper-version
    attributes:
      label: schema-keeper version
      placeholder: "e.g. 2.1.0, 3.0.0, dev-master"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g. 7.4, 8.1, 8.3"
    validations:
      required: true

  - type: input
    id: postgresql-version
    attributes:
      label: PostgreSQL version
      placeholder: "e.g. 12, 15, 17"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
